<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOOM KELOMPOK 4 🤖💣</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #050508;
  --panel: #0d0e15;
  --border: #00ffcc;
  --yellow: #00ffcc;
  --orange: #ff007f;
  --red: #ff3333;
  --green: #39ff14;
  --blue: #00bfff;
  --purple: #bd00ff;
  --white: #ffffff;
  --gray: #44495e;
  --cell: 60px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  font-family: 'Press Start 2P', monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  color: var(--white);
}

/* ── SCREENS ── */
.screen { display: none; position: absolute; inset: 0; justify-content: center; align-items: center; flex-direction: column; }
.screen.active { display: flex; }

/* ── WELCOME SCREEN ── */
#welcome-screen {
  background: radial-gradient(ellipse at 50% 30%, #20003b 0%, #050508 80%);
  gap: 16px;
}

.title-wrap { text-align: center; margin-bottom: 4px; }
.title-main {
  font-family: 'Orbitron', sans-serif;
  font-size: 42px;
  font-weight: 900;
  color: var(--green);
  text-shadow: 0 0 20px rgba(57, 255, 20, 0.6), 4px 4px 0 var(--orange), 8px 8px 0 rgba(189, 0, 255, 0.5);
  letter-spacing: 2px;
  animation: pulse 1.5s ease-in-out infinite;
}
.title-sub { font-size: 11px; color: var(--border); letter-spacing: 6px; margin-top: 8px; }

@keyframes pulse {
  0%,100% { text-shadow: 0 0 20px rgba(57, 255, 20, 0.6), 4px 4px 0 var(--orange); transform: scale(1); }
  50%      { text-shadow: 0 0 35px rgba(57, 255, 20, 0.9), 4px 4px 0 var(--purple); transform: scale(1.02); }
}

/* ── AVATAR SELECTOR ── */
.avatar-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin: 10px 0;
}
.avatar-options {
  display: flex;
  gap: 12px;
}
.avatar-box {
  width: 56px;
  height: 56px;
  border: 2px solid var(--gray);
  background: #11121b;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
}
.avatar-box:hover {
  border-color: var(--border);
  box-shadow: 0 0 8px rgba(0, 255, 204, 0.3);
}
.avatar-box.active {
  border-color: var(--orange);
  box-shadow: 0 0 12px rgba(255, 0, 127, 0.6);
  transform: scale(1.08);
}
.avatar-name {
  font-size: 6px;
  color: #888;
  margin-top: 4px;
  font-family: sans-serif;
  text-transform: uppercase;
}
.avatar-box.active .avatar-name {
  color: var(--orange);
  font-weight: bold;
}

.input-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.input-label { font-size: 9px; color: var(--border); letter-spacing: 2px; }
#player-name {
  background: #11121b;
  border: 2px solid var(--border);
  color: var(--white);
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  padding: 12px 20px;
  outline: none;
  text-align: center;
  width: 280px;
  caret-color: var(--border);
}
#player-name:focus { border-color: var(--orange); box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }

.btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  padding: 14px 32px;
  border: none;
  cursor: pointer;
  letter-spacing: 2px;
  transition: transform .1s, box-shadow .1s;
  position: relative;
}
.btn:active { transform: translate(2px,2px); }

.btn-primary {
  background: var(--orange);
  color: #fff;
  box-shadow: 4px 4px 0 var(--purple), 8px 8px 0 rgba(0,0,0,0.5);
}
.btn-primary:hover { box-shadow: 6px 6px 0 var(--purple); transform: translate(-2px,-2px); }

.btn-secondary {
  background: transparent;
  color: var(--border);
  border: 2px solid var(--border);
  box-shadow: 3px 3px 0 rgba(0, 255, 204, 0.2);
  font-size: 10px;
  padding: 10px 24px;
}
.btn-secondary:hover { background: rgba(0, 255, 204, 0.1); }

/* ── LEADERBOARD ── */
.lb-wrap { width: 380px; margin-top: 5px; }
.lb-title { font-size: 10px; color: var(--green); text-align: center; margin-bottom: 12px; letter-spacing: 3px; }
.lb-table { width: 100%; border-collapse: collapse; font-size: 9px; }
.lb-table th { color: var(--gray); padding: 6px 8px; border-bottom: 1px solid var(--gray); text-align: left; }
.lb-table td { padding: 8px 8px; border-bottom: 1px solid #11121b; }
.lb-table tr:nth-child(1) td { color: var(--orange); }
.lb-table tr:nth-child(2) td { color: var(--border); }
.lb-table tr:nth-child(3) td { color: var(--green); }

/* ── GAME SCREEN ── */
#game-screen { background: var(--bg); flex-direction: column; gap: 0; }

/* ── HUD ── */
#hud {
  width: 900px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--panel);
  border: 2px solid var(--border);
  border-bottom: none;
  font-size: 9px;
  gap: 12px;
  flex-wrap: wrap;
}
.hud-item { display: flex; align-items: center; gap: 6px; }
.hud-item span.label { color: var(--gray); }
.hud-item span.val { color: var(--green); min-width: 30px; }
.lives-wrap { display: flex; gap: 4px; }
.life-icon { font-size: 14px; }

/* ── BOARD ── */
#game-board {
  position: relative;
  width: 900px;
  height: 540px;
  background: #080911;
  border: 2px solid var(--border);
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(0, 255, 204, 0.15);
}

/* ── CELLS ── */
.cell { position: absolute; width: var(--cell); height: var(--cell); }

.cell-wall-solid {
  background: #232329;
  border: 2px solid #141417;
  background-image:
    linear-gradient(135deg, #32323c 25%, transparent 25%),
    linear-gradient(225deg, #18181f 25%, transparent 25%),
    linear-gradient(45deg, #2b2b36 10%, #1c1c22 90%);
  background-size: 20px 20px;
  box-shadow:
    inset 4px 4px 0px #3e3e4a,
    inset -4px -4px 0px #0f0f12;
}

.cell-wall-brick {
  background: #b33927;
  border: 2px solid #4e1912;
  background-image:
    linear-gradient(90deg, #4e1912 4px, transparent 4px),
    linear-gradient(0deg, #4e1912 4px, transparent 4px),
    linear-gradient(90deg, #4e1912 4px, transparent 4px);
  background-size: 30px 15px, 30px 15px, 30px 15px;
  background-position: 0 0, 0 0, 15px 15px;
  box-shadow: inset -3px -3px 0px #7a1e11, inset 3px 3px 0px #e6624e;
}

.cell-floor {
  background: repeating-linear-gradient(45deg,#07080e 0,#07080e 30px,#0b0c16 30px,#0b0c16 60px);
}

/* ── ENTITIES ── */
.entity-player {
  background: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 38px;
  z-index: 10;
  transition: left .06s, top .06s;
  filter: drop-shadow(0 0 8px var(--green));
}
.entity-enemy {
  background: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  z-index: 9;
  animation: enemyBob 0.8s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 8px var(--red));
}
@keyframes enemyBob { from{transform:translateY(0)} to{transform:translateY(-6px)} }

.entity-bomb {
  background: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 38px;
  z-index: 8;
  animation: bombTick .3s ease-in-out infinite alternate;
}
@keyframes bombTick { from{transform:scale(0.9)} to{transform:scale(1.15)} }

.entity-explosion {
  background: radial-gradient(circle, #fff 10%, var(--border) 40%, var(--purple) 70%, transparent 100%);
  z-index: 12;
  animation: explodeAnim .4s forwards;
}
@keyframes explodeAnim {
  0%   { opacity:1; transform:scale(.4); }
  50%  { opacity:1; transform:scale(1.2); }
  100% { opacity:0; transform:scale(1); }
}

.entity-item {
  background: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
  z-index: 7;
  animation: itemFloat 1s ease-in-out infinite alternate;
}
@keyframes itemFloat { from{transform:translateY(0) scale(0.9);} to{transform:translateY(-5px) scale(1.1);} }

/* ── OVERLAY SCREENS ── */
#gameover-screen, #victory-screen {
  background: rgba(5, 5, 8, 0.9);
  backdrop-filter: blur(6px);
  gap: 20px;
  z-index: 100;
}
.result-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 54px;
  font-weight: 900;
  letter-spacing: 4px;
}
#gameover-screen .result-title { color: var(--red); text-shadow: 0 0 20px rgba(255,51,51,0.6); }
#victory-screen .result-title  { color: var(--green); text-shadow: 0 0 20px rgba(57,255,20,0.6); }
.result-sub   { font-size: 10px; color: var(--gray); letter-spacing: 2px; }
.result-score { font-size: 12px; color: var(--white); text-align: center; line-height: 1.8; }

/* ── MOBILE CONTROLS ── */
.mobile-controls {
  display: none;
  width: 900px;
  padding: 12px;
  justify-content: center;
  gap: 24px;
  background: var(--panel);
  border: 2px solid var(--border);
  border-top: none;
}
.d-pad { display: grid; grid-template-columns: repeat(3,50px); grid-template-rows: repeat(3,50px); gap: 4px; }
.d-btn {
  background: #141622;
  border: 2px solid var(--gray);
  color: var(--border);
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  user-select: none;
}
.d-btn:active { background: var(--purple); color: #fff; }
.bomb-btn {
  background: #200515;
  border: 2px solid var(--orange);
  color: var(--orange);
  font-size: 32px;
  width: 90px; height: 90px;
  border-radius: 50%;
  cursor: pointer;
  align-self: center;
  display: flex; align-items: center; justify-content: center;
  user-select: none;
  box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
}
.bomb-btn:active { background: var(--orange); color: #fff; }

@media (max-width: 960px) {
  #hud, #game-board, .mobile-controls { width: 100vw; }
  #game-board { height: calc(100vw * 0.6); }
  .mobile-controls { display: flex; }
  :root { --cell: calc(100vw / 15); }
  .title-main { font-size: 24px; }
}
  </style>
</head>
<body>

  <!-- WELCOME SCREEN -->
  <div id="welcome-screen" class="screen active">
    <div class="title-wrap">
      <div class="title-main">🤖 BOOM KELOMPOK 4</div>
      <div class="title-sub">CYBERPUNK MECHA BOMBER</div>
    </div>

    <div class="avatar-section">
      <div class="input-label">PILIH AVATAR ROBOT</div>
      <div class="avatar-options">
        <div class="avatar-box active" onclick="selectAvatar('🤖', this)">🤖<span class="avatar-name">Classic</span></div>
        <div class="avatar-box" onclick="selectAvatar('👾', this)">👾<span class="avatar-name">Alien</span></div>
        <div class="avatar-box" onclick="selectAvatar('🦊', this)">🦊<span class="avatar-name">Fox-Bot</span></div>
        <div class="avatar-box" onclick="selectAvatar('💀', this)">💀<span class="avatar-name">Doom</span></div>
        <div class="avatar-box" onclick="selectAvatar('🚀', this)">🚀<span class="avatar-name">Mecha</span></div>
      </div>
    </div>

    <div class="input-wrap">
      <div class="input-label">NAMA PILOT</div>
      <input type="text" id="player-name" placeholder="Ketik nama pilot..." maxlength="16" autocomplete="off">
      <div id="name-error" style="font-size:8px;color:var(--red);min-height:16px;"></div>
      <button class="btn btn-primary" onclick="startGame()">▶ INISIALISASI GAME</button>
    </div>

    <div class="lb-wrap">
      <div class="lb-title">🏆 REKOR PILOT TERBAIK — TOP 5</div>
      <table class="lb-table">
        <thead><tr><th>#</th><th>NAMA</th><th>SKOR</th><th>WAKTU</th></tr></thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div id="hud">
      <div class="hud-item">
        <span class="label">PILOT:</span>
        <span class="val" id="hud-name">---</span>
      </div>
      <div class="hud-item">
        <span class="label">SKOR:</span>
        <span class="val" id="hud-score">0</span>
      </div>
      <div class="hud-item">
        <span class="label">WAKTU:</span>
        <span class="val" id="hud-time">0s</span>
      </div>
      <div class="hud-item">
        <span class="label">NYAWA:</span>
        <div class="lives-wrap" id="hud-lives"></div>
      </div>
      <div class="hud-item">
        <span class="label">🔥 RADIUS:</span>
        <span class="val" id="hud-radius">2</span>
      </div>
      <button class="btn btn-secondary" onclick="triggerGameOver(true)">ABORT MISSION</button>
    </div>

    <div id="game-board"></div>

    <div class="mobile-controls">
      <div class="d-pad">
        <div></div>
        <button class="d-btn" onpointerdown="mobileMove(0,-1)">▲</button>
        <div></div>
        <button class="d-btn" onpointerdown="mobileMove(-1,0)">◀</button>
        <div></div>
        <button class="d-btn" onpointerdown="mobileMove(1,0)">▶</button>
        <div></div>
        <button class="d-btn" onpointerdown="mobileMove(0,1)">▼</button>
        <div></div>
      </div>
      <button class="bomb-btn" onpointerdown="placeBomb()">💣</button>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameover-screen" class="screen">
    <div class="result-title">MISSION FAILED</div>
    <div class="result-sub">ROBOTMU HANCUR LEBUR...</div>
    <div class="result-score" id="go-score"></div>
    <button class="btn btn-primary" onclick="goToMenu()">↩ KEMBALI KE MARKAS</button>
  </div>

  <!-- VICTORY SCREEN -->
  <div id="victory-screen" class="screen">
    <div class="result-title">VICTORY!</div>
    <div class="result-sub">SEMUA STAGE BERHASIL DIKUASAI!</div>
    <div class="result-score" id="vc-score"></div>
    <button class="btn btn-primary" onclick="goToMenu()">↩ KEMBALI KE MARKAS</button>
  </div>

  <script>
// ── CONSTANTS ──
const COLS = 15, ROWS = 9;
const EMPTY = 0, WALL_SOLID = 1, WALL_BRICK = 2, ITEM = 3;
const CELL_SIZE = 60;

// ── STATE ──
let gameState = {};
let gameLoopInterval = null, timerInterval = null, enemyInterval = null;
let currentPlayer = '';
let selectedIcon = '🤖';

// ── FEATURE: SELEKSI AVATAR ──
function selectAvatar(icon, element) {
  selectedIcon = icon;
  document.querySelectorAll('.avatar-box').forEach(box => box.classList.remove('active'));
  element.classList.add('active');
}

// ── MAP LAYOUT ──
function buildBoard() {
  const b = [];
  for (let r = 0; r < ROWS; r++) {
    b[r] = [];
    for (let c = 0; c < COLS; c++) {
      if (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1) { b[r][c] = WALL_SOLID; }
      else if (r % 2 === 0 && c % 2 === 0) { b[r][c] = WALL_SOLID; }
      else {
        const safe = (r<=2 && c<=2) || (r<=2 && c>=COLS-3) || (r>=ROWS-3 && c<=2);
        b[r][c] = (!safe && Math.random() < 0.38) ? WALL_BRICK : EMPTY;
      }
    }
  }
  [[1,1],[1,2],[2,1]].forEach(([r,c]) => b[r][c] = EMPTY);
  return b;
}

function buildEnemies(level) {
  const count = Math.min(4 + level, 12);
  const enemies = [];
  const spots = [
    {x:COLS-2, y:ROWS-2}, {x:COLS-3, y:ROWS-2}, {x:COLS-2, y:ROWS-3},
    {x:COLS-4, y:1}, {x:7, y:4}, {x:7, y:7}, {x:1, y:ROWS-2},
    {x:12, y:3}, {x:2, y:6}, {x:10, y:5}
  ];
  for(let i=0; i<count; i++) {
    const spot = spots[i % spots.length];
    enemies.push({ x: spot.x, y: spot.y, id: i, dir: Math.floor(Math.random()*4) });
  }
  return enemies;
}

// ── START GAME ──
function startGame() {
  const nameInput = document.getElementById('player-name');
  const err = document.getElementById('name-error');
  const name = nameInput.value.trim();
  if (!name) { err.textContent = '⚠ Nama tidak boleh kosong!'; return; }
  err.textContent = '';
  currentPlayer = name;

  gameState = {
    player: { x:1, y:1, lives:3, blastRadius:2, moveDelay: 150, lastMoveTime: 0, avatar: selectedIcon },
    board: buildBoard(),
    enemies: buildEnemies(1),
    bombs: [],
    items: [],
    isPlaying: true,
    timeElapsed: 0,
    score: 0,
    level: 1,
    combo: 0,
    lastKillTime: 0,
    playerName: name
  };

  showScreen('game-screen');
  document.getElementById('hud-name').textContent = name;
  injectLevelHUD();
  updateHUD();
  renderBoard();
  startLoops();
}

function injectLevelHUD() {
  if (!document.getElementById('hud-level-item')) {
    const hud = document.getElementById('hud');
    const levelDiv = document.createElement('div');
    levelDiv.className = 'hud-item';
    levelDiv.id = 'hud-level-item';
    levelDiv.innerHTML = '<span class="label">STAGE:</span><span class="val" id="hud-level">1</span>';
    hud.insertBefore(levelDiv, hud.querySelector('button'));
  }
}

function startLoops() {
  stopLoops();
  gameLoopInterval = setInterval(gameLoop, 1000/60);
  timerInterval    = setInterval(() => {
    if (!gameState.isPlaying) return;
    gameState.timeElapsed++;
    document.getElementById('hud-time').textContent = gameState.timeElapsed + 's';
    if (Date.now() - gameState.lastKillTime > 3000) gameState.combo = 0;
  }, 1000);
  enemyInterval = setInterval(moveEnemies, Math.max(400, 800 - (gameState.level * 40)));
}

function stopLoops() {
  clearInterval(gameLoopInterval);
  clearInterval(timerInterval);
  clearInterval(enemyInterval);
}

function gameLoop() {
  if (!gameState.isPlaying) return;
  checkPlayerEnemyCollision();
  checkPlayerItemCollision();
  renderBoard();
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (!gameState.isPlaying) return;
  const map = {
    'ArrowUp':    [0,-1], 'w':[0,-1],
    'ArrowDown':  [0, 1], 's':[0, 1],
    'ArrowLeft':  [-1,0], 'a':[-1,0],
    'ArrowRight': [1, 0], 'd':[1, 0],
  };
  if (map[e.key]) { e.preventDefault(); movePlayer(...map[e.key]); }
  if (e.key === ' ') { e.preventDefault(); placeBomb(); }
});

function mobileMove(dx, dy) { if (gameState.isPlaying) movePlayer(dx, dy); }

function movePlayer(dx, dy) {
  const p = gameState.player;
  const now = Date.now();
  if (now - p.lastMoveTime < p.moveDelay) return;
  const nx = p.x + dx, ny = p.y + dy;
  if (nx<0||nx>=COLS||ny<0||ny>=ROWS) return;
  const cell = gameState.board[ny][nx];
  if (cell === WALL_SOLID || cell === WALL_BRICK) return;
  if (gameState.bombs.some(b => b.x===nx && b.y===ny)) return;
  p.x = nx; p.y = ny;
  p.lastMoveTime = now;
}

// ── ENEMY MOVEMENT ──
const DIRS = [[1,0],[-1,0],[0,1],[0,-1]];
function moveEnemies() {
  if (!gameState.isPlaying) return;
  gameState.enemies.forEach(en => {
    for (let attempt = 0; attempt < 4; attempt++) {
      const d = DIRS[(en.dir + attempt) % 4];
      const nx = en.x + d[0], ny = en.y + d[1];
      if (nx<0||nx>=COLS||ny<0||ny>=ROWS) { en.dir = Math.floor(Math.random()*4); continue; }
      const cell = gameState.board[ny][nx];
      if (cell === EMPTY || cell === ITEM) {
        if (gameState.bombs.some(b=>b.x===nx&&b.y===ny)) { en.dir=Math.floor(Math.random()*4); continue; }
        en.x = nx; en.y = ny;
        if (attempt > 0) en.dir = (en.dir + attempt) % 4;
        break;
      }
      en.dir = Math.floor(Math.random()*4);
    }
    if (Math.random() < 0.20) en.dir = Math.floor(Math.random()*4);
  });
}

// ── BOMB ──
function placeBomb() {
  if (!gameState.isPlaying) return;
  const p = gameState.player;
  if (gameState.bombs.some(b => b.x===p.x && b.y===p.y)) return;
  const bomb = { x: p.x, y: p.y, id: Date.now() };
  gameState.bombs.push(bomb);
  setTimeout(() => explodeBomb(bomb), 2000);
}

function explodeBomb(bomb) {
  if (!gameState.isPlaying && !gameState.board) return;
  gameState.bombs = gameState.bombs.filter(b => b.id !== bomb.id);

  const radius = gameState.player.blastRadius;
  const blastCells = [{x: bomb.x, y: bomb.y}];

  DIRS.forEach(([dx, dy]) => {
    for (let i = 1; i <= radius; i++) {
      const bx = bomb.x + dx*i, by = bomb.y + dy*i;
      if (bx<0||bx>=COLS||by<0||by>=ROWS) break;
      const cell = gameState.board[by][bx];
      if (cell === WALL_SOLID) break;
      blastCells.push({x:bx, y:by});
      if (cell === WALL_BRICK) {
        gameState.board[by][bx] = EMPTY;
        if (Math.random() < 0.45) {
          const rand = Math.random();
          let type = 'score';
          if (rand < 0.25) type = 'radius';
          else if (rand < 0.45) type = 'speed';
          else if (rand < 0.55) type = 'heart';
          gameState.items.push({x:bx, y:by, type: type});
          gameState.board[by][bx] = ITEM;
        }
        break;
      }
    }
  });

  blastCells.forEach(({x,y}) => {
    const div = document.createElement('div');
    div.className = 'cell entity-explosion';
    div.style.left = (x * CELL_SIZE) + 'px';
    div.style.top  = (y * CELL_SIZE) + 'px';
    div.style.width = CELL_SIZE + 'px';
    div.style.height = CELL_SIZE + 'px';
    document.getElementById('game-board').appendChild(div);
    setTimeout(() => div.remove(), 400);
  });

  const p = gameState.player;
  if (blastCells.some(c => c.x===p.x && c.y===p.y)) playerDie();

  let killedCount = 0;
  gameState.enemies = gameState.enemies.filter(en => {
    if (blastCells.some(c => c.x===en.x && c.y===en.y)) { killedCount++; return false; }
    return true;
  });

  if (killedCount > 0) {
    const now = Date.now();
    if (now - gameState.lastKillTime < 3000) gameState.combo += killedCount;
    else gameState.combo = killedCount;
    gameState.lastKillTime = now;
    gameState.score += (100 * killedCount) + (gameState.combo * 25);
    updateHUD();
  }

  if (gameState.enemies.length === 0) {
    if (gameState.level >= 5) triggerVictory();
    else nextStage();
  }
}

function nextStage() {
  gameState.level++;
  gameState.board = buildBoard();
  gameState.enemies = buildEnemies(gameState.level);
  gameState.bombs = [];
  gameState.items = [];
  gameState.player.x = 1;
  gameState.player.y = 1;
  updateHUD();
  renderBoard();
}

function checkPlayerEnemyCollision() {
  const p = gameState.player;
  if (gameState.enemies.some(en => en.x===p.x && en.y===p.y)) playerDie();
}

function checkPlayerItemCollision() {
  const p = gameState.player;
  gameState.items = gameState.items.filter(item => {
    if (item.x===p.x && item.y===p.y) {
      if (item.type === 'radius') { p.blastRadius = Math.min(p.blastRadius+1, 6); }
      else if (item.type === 'speed') { p.moveDelay = Math.max(70, p.moveDelay - 25); }
      else if (item.type === 'heart') { p.lives = Math.min(p.lives + 1, 5); }
      else { gameState.score += 75; }
      gameState.board[item.y][item.x] = EMPTY;
      updateHUD();
      return false;
    }
    return true;
  });
}

function playerDie() {
  const p = gameState.player;
  p.lives--;
  gameState.combo = 0;
  updateHUD();
  if (p.lives <= 0) { triggerGameOver(); return; }
  p.x = 1; p.y = 1;
}

function renderBoard() {
  const board = document.getElementById('game-board');
  board.innerHTML = '';

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.left = (c * CELL_SIZE) + 'px';
      cell.style.top  = (r * CELL_SIZE) + 'px';
      cell.style.width = CELL_SIZE + 'px';
      cell.style.height = CELL_SIZE + 'px';
      const v = gameState.board[r][c];
      if (v === WALL_SOLID) cell.classList.add('cell-wall-solid');
      else if (v === WALL_BRICK) cell.classList.add('cell-wall-brick');
      else cell.classList.add('cell-floor');
      board.appendChild(cell);
    }
  }

  gameState.items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'cell entity-item';
    el.style.left = (item.x * CELL_SIZE) + 'px';
    el.style.top  = (item.y * CELL_SIZE) + 'px';
    el.style.width = CELL_SIZE + 'px';
    el.style.height = CELL_SIZE + 'px';
    if (item.type === 'radius') el.textContent = '🔥';
    else if (item.type === 'speed') el.textContent = '⚡';
    else if (item.type === 'heart') el.textContent = '🧪';
    else el.textContent = '💎';
    board.appendChild(el);
  });

  gameState.bombs.forEach(bomb => {
    const el = document.createElement('div');
    el.className = 'cell entity-bomb';
    el.style.left = (bomb.x * CELL_SIZE) + 'px';
    el.style.top  = (bomb.y * CELL_SIZE) + 'px';
    el.style.width = CELL_SIZE + 'px';
    el.style.height = CELL_SIZE + 'px';
    el.textContent = '💣';
    board.appendChild(el);
  });

  gameState.enemies.forEach(en => {
    const el = document.createElement('div');
    el.className = 'cell entity-enemy';
    el.style.left = (en.x * CELL_SIZE) + 'px';
    el.style.top  = (en.y * CELL_SIZE) + 'px';
    el.style.width = CELL_SIZE + 'px';
    el.style.height = CELL_SIZE + 'px';
    el.textContent = '🐙';
    board.appendChild(el);
  });

  const p = gameState.player;
  const pel = document.createElement('div');
  pel.className = 'cell entity-player';
  pel.style.left = (p.x * CELL_SIZE) + 'px';
  pel.style.top  = (p.y * CELL_SIZE) + 'px';
  pel.style.width = CELL_SIZE + 'px';
  pel.style.height = CELL_SIZE + 'px';
  pel.textContent = p.avatar;
  board.appendChild(pel);
}

function updateHUD() {
  const p = gameState.player;
  const livesEl = document.getElementById('hud-lives');
  if (livesEl) {
    livesEl.innerHTML = '';
    for (let i=0; i < Math.max(3, p.lives); i++) {
      const h = document.createElement('span');
      h.className = 'life-icon';
      h.textContent = i < p.lives ? '💚' : '🖤';
      livesEl.appendChild(h);
    }
  }
  document.getElementById('hud-score').textContent = gameState.score;
  document.getElementById('hud-radius').textContent = p.blastRadius;
  const lvlEl = document.getElementById('hud-level');
  if (lvlEl) lvlEl.textContent = gameState.level;
}

function triggerGameOver(manual = false) {
  gameState.isPlaying = false;
  stopLoops();
  if (!manual) {
    saveScore();
    document.getElementById('go-score').innerHTML = `STAGE DICAPAI: ${gameState.level}<br><br>FINAL SKOR: ${gameState.score}<br>WAKTU: ${gameState.timeElapsed}s`;
    showScreen('gameover-screen');
  } else {
    goToMenu();
  }
}

function triggerVictory() {
  gameState.isPlaying = false;
  stopLoops();
  gameState.score += Math.max(0, 1000 - gameState.timeElapsed * 2);
  saveScore();
  document.getElementById('vc-score').innerHTML = `MISSION SUCCESS! 🎉<br><br>TOTAL SKOR: ${gameState.score}<br>TOTAL WAKTU: ${gameState.timeElapsed}s`;
  showScreen('victory-screen');
}

function saveScore() {
  try {
    const raw = localStorage.getItem('nekoboom_scores');
    const scores = raw ? JSON.parse(raw) : [];
    scores.push({ name: gameState.playerName, score: gameState.score, time: gameState.timeElapsed });
    scores.sort((a,b) => b.score - a.score);
    localStorage.setItem('nekoboom_scores', JSON.stringify(scores.slice(0,20)));
  } catch(e) {}
}

function renderScoreboard() {
  try {
    const raw = localStorage.getItem('nekoboom_scores');
    const scores = raw ? JSON.parse(raw) : [];
    const tbody = document.getElementById('lb-body');
    tbody.innerHTML = '';
    scores.slice(0,5).forEach((s,i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i+1}</td><td>${s.name}</td><td>${s.score}</td><td>${s.time}s</td>`;
      tbody.appendChild(tr);
    });
    if (!scores.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:#44495e;text-align:center;padding:12px;font-size:8px;">Belum ada skor mission</td></tr>';
    }
  } catch(e) {}
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToMenu() {
  stopLoops();
  gameState = {};
  renderScoreboard();
  showScreen('welcome-screen');
}

renderScoreboard();
  </script>
</body>
</html>
